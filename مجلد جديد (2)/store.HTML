<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر التاجر - Walid Market</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .shimmer-btn { position: relative; overflow: hidden; }
        .shimmer-btn::after {
            content: ''; position: absolute; top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: translateX(100%); animation: shimmer 2s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div id="page-loader" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center">
        <div class="animate-spin text-4xl mb-4 text-blue-600">🔄</div>
        <p class="font-bold text-gray-500">جاري فتح أبواب المتجر...</p>
    </div>

    <div class="h-48 md:h-64 bg-gradient-to-r from-blue-600 to-indigo-700"></div>

    <div class="max-w-6xl mx-auto px-4">
        <div class="bg-white rounded-3xl shadow-xl p-6 -mt-20 relative z-10 flex flex-col items-center text-center border border-gray-100">
            <div id="merchant-avatar-container" class="w-32 h-32 rounded-full border-4 border-white shadow-lg bg-gray-200 -mt-20 overflow-hidden flex items-center justify-center">
                <img id="merchant-avatar" src="" alt="صورة التاجر" class="w-full h-full object-cover hidden">
                <span id="merchant-initial" class="text-4xl text-gray-400">🏪</span>
            </div>
            
            <div class="mt-4 flex items-center gap-2">
                <h1 id="store-name" class="text-2xl md:text-3xl font-black text-gray-900">جاري التحميل...</h1>
                <i class="fa-solid fa-circle-check text-blue-500 text-xl" title="متجر موثوق"></i>
            </div>
            
            <p id="store-bio" class="text-gray-500 mt-2 max-w-2xl text-sm md:text-base">بائع معتمد في منصة Walid Market.</p>

            <div id="social-links" class="flex flex-wrap justify-center gap-3 mt-6"></div>
        </div>

        <div class="mt-10 bg-gradient-to-r from-emerald-500 to-teal-600 rounded-3xl p-6 md:p-8 shadow-lg shadow-emerald-200 flex flex-col md:flex-row justify-between items-center gap-6 transform transition hover:scale-[1.01]">
            <div class="text-white text-center md:text-right">
                <h3 class="text-xl md:text-2xl font-black mb-2">ألا تملك متجراً مثل هذا بعد؟ 🏪</h3>
                <p class="opacity-90">ابدأ ببيع منتجاتك الآن على منصتنا ووصول إلى آلاف الزبائن مجاناً!</p>
            </div>
            <a href="login.html" class="shimmer-btn bg-white text-emerald-600 font-black px-8 py-4 rounded-2xl shadow-xl hover:shadow-2xl transition-all whitespace-nowrap">
                🚀 أنشئ متجرك الآن
            </a>
        </div>

        <div class="mt-12 mb-8 flex justify-between items-baseline">
            <h2 class="text-2xl font-black text-gray-800 border-r-4 border-blue-600 pr-3">منتجات المتجر</h2>
            <span id="product-count" class="text-gray-400 text-sm font-bold">0 منتج</span>
        </div>

        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-20"></div>
    </div>

    <script>
        // إعدادات الفايربيز الخاصة بمشروعك الحالي
        const firebaseConfig = {
            apiKey: "AIzaSyAIfkBI0WhxZr1hCyiuYcbVYAy3wXAJxCU",
            authDomain: "walid-shop.firebaseapp.com",
            projectId: "walid-shop",
            storageBucket: "walid-shop.firebasestorage.app",
            messagingSenderId: "3705207162",
            appId: "1:3705207162:web:7b3a80ba4acea3e29c3ec3",
            measurementId: "G-YX3PT078PG"
        };

        // تهيئة الفايربيز
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // جلب معرف التاجر من الرابط العلوي للمتصفح
        const urlParams = new URLSearchParams(window.location.search);
        const merchantId = urlParams.get('merchantId') || urlParams.get('id');

        async function loadStore() {
            if (!merchantId) {
                document.getElementById('page-loader').innerHTML = "<p class='text-red-500 font-bold'>❌ خطأ: لم يتم تحديد معرف التاجر في الرابط!</p>";
                return;
            }

            try {
                // 1. جلب بيانات التاجر الأساسية
                const merchantDoc = await db.collection('users').doc(merchantId).get();
                
                if (!merchantDoc.exists) {
                    document.getElementById('store-name').innerText = "متجر غير موجود";
                    document.getElementById('page-loader').classList.add('hidden');
                    return;
                }
                
                const merchant = merchantDoc.data();
                document.getElementById('store-name').innerText = merchant.name || "بائع غير مسمى";
                if (merchant.bio) {
                    document.getElementById('store-bio').innerText = merchant.bio;
                }
                
                if (merchant.avatar) {
                    const img = document.getElementById('merchant-avatar');
                    img.src = merchant.avatar;
                    img.classList.remove('hidden');
                    document.getElementById('merchant-initial').classList.add('hidden');
                }

                // 2. جلب روابط التواصل الاجتماعي من إعدادات التاجر
                try {
                    const settingsSnapshot = await db.collection('merchant_settings').where('merchant', '==', merchantId).limit(1).get();
                    
                    if (!settingsSnapshot.empty) {
                        const settings = settingsSnapshot.docs[0].data();
                        const socialContainer = document.getElementById('social-links');
                        socialContainer.innerHTML = ''; // تنظيف الحاوية
                        
                        if (settings.facebook) socialContainer.innerHTML += `<a href="${settings.facebook}" target="_blank" class="w-10 h-10 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center hover:bg-blue-600 hover:text-white transition"><i class="fa-brands fa-facebook-f"></i></a>`;
                        if (settings.instagram) socialContainer.innerHTML += `<a href="${settings.instagram}" target="_blank" class="w-10 h-10 bg-pink-50 text-pink-600 rounded-xl flex items-center justify-center hover:bg-pink-600 hover:text-white transition"><i class="fa-brands fa-instagram"></i></a>`;
                        if (settings.tiktok) socialContainer.innerHTML += `<a href="${settings.tiktok}" target="_blank" class="w-10 h-10 bg-gray-100 text-gray-900 rounded-xl flex items-center justify-center hover:bg-gray-900 hover:text-white transition"><i class="fa-brands fa-tiktok"></i></a>`;
                        if (settings.whatsapp) {
                            const cleanPhone = settings.whatsapp.replace(/\D/g, ''); // تنظيف الرقم من الرموز ليعمل الرابط فوراً
                            socialContainer.innerHTML += `<a href="https://wa.me/${cleanPhone}" target="_blank" class="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center hover:bg-emerald-600 hover:text-white transition"><i class="fa-brands fa-whatsapp"></i></a>`;
                        }
                    }
                } catch (e) { console.log("لا توجد إعدادات تواصل اجتماعي مضافة."); }

                // 3. جلب منتجات هذا التاجر حصراً
                const productsSnapshot = await db.collection('products')
                                                .where('user_id', '==', merchantId)
                                                .get();
                
                // تصفية المنتجات النشطة فقط برمجياً لضمان سلاسة العمل بدون مشاكل حظر الفايربيز
                const products = productsSnapshot.docs
                    .map(doc => ({ id: doc.id, ...doc.data() }))
                    .filter(p => p.is_active !== false); // يعرض المنتجات إلا إذا تم إيقافها عمداً

                // ترتيب المنتجات من الأحدث إلى الأقدم
                products.sort((a, b) => new Date(b.created || 0) - new Date(a.created || 0));

                document.getElementById('product-count').innerText = `${products.length} منتج`;
                renderProducts(products);

            } catch (error) {
                console.error(error);
                document.getElementById('products-grid').innerHTML = "<p class='col-span-full text-center text-gray-400'>حدث خطأ أثناء تحميل منتجات المتجر.</p>";
            } finally {
                document.getElementById('page-loader').classList.add('hidden');
            }
        }

        // دالة رندرة وعرض المنتجات في الصفحة
        function renderProducts(list) {
            const grid = document.getElementById('products-grid');
            if (list.length === 0) {
                grid.innerHTML = "<p class='col-span-full text-center py-10 text-gray-400 font-bold bg-white rounded-3xl border border-dashed border-gray-200'>هذا التاجر لم ينشر أي منتجات بعد.</p>";
                return;
            }

            grid.innerHTML = list.map(product => {
                let productImg = 'https://placehold.co/400x300?text=No+Image';
                if (product.image) {
                    productImg = Array.isArray(product.image) ? product.image[0] : product.image;
                }

                // تحويل السعر لرقم وتنسيقه بشكل جزائري جميل
                const priceFormatted = Number(product.price || 0).toLocaleString('fr-FR');

                return `
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 hover:shadow-xl transition-all duration-300 group">
                    <div class="h-56 overflow-hidden relative">
                        <img src="${productImg}" alt="${product.name}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        <div class="absolute top-3 left-3 bg-blue-600 text-white text-[10px] font-bold px-3 py-1 rounded-full shadow-lg">جديد</div>
                    </div>
                    <div class="p-5">
                        <h3 class="font-bold text-gray-800 mb-2 truncate">${product.name || 'منتج بدون اسم'}</h3>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-blue-600 font-black text-lg">${priceFormatted} <small class="text-[10px] font-bold">د.ج</small></span>
                            <a href="product-details.html?id=${product.id}" class="bg-gray-900 text-white text-xs font-bold px-4 py-2 rounded-xl hover:bg-blue-600 transition">
                                التفاصيل
                            </a>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // إطلاق الجلب عند فتح الصفحة مباشرة
        loadStore();
    </script>
</body>
</html>
